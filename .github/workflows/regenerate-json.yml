name: Regenerate fax.json

on:
  pull_request:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - run: python3 bin/generate-json

      - name: Commit updated fax.json
        run: |
          git diff --quiet fax.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fax.json
          git commit -m "Regenerate fax.json"
          git push
